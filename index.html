<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Message Checker</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Inter, Arial, sans-serif;
    }

    body{
        background:#000;
        color:#fff;
        min-height:100vh;
        padding:50px;
    }

    .container{
        max-width:1200px;
        margin:auto;
    }

    h1{
        font-size:3rem;
        margin-bottom:10px;
        font-weight:700;
    }

    .description{
        font-size:1.3rem;
        color:#b3b3b3;
        margin-bottom:35px;
    }

    .limit-box{
        display:inline-block;
        padding:14px 22px;
        background:#222;
        border:1px solid #444;
        border-radius:14px;
        color:#d0d0d0;
        margin-bottom:35px;
    }

    .card{
        background:#2a2a2a;
        border:1px solid #444;
        border-radius:24px;
        padding:35px;
    }

    .label{
        font-size:1.3rem;
        font-weight:700;
        color:#bdbdbd;
        margin-bottom:20px;
        letter-spacing:1px;
    }

    textarea{
        width:100%;
        height:320px;
        background:#303030;
        color:white;
        border:1px solid #555;
        border-radius:16px;
        padding:22px;
        font-size:1.3rem;
        resize:none;
    }

    textarea:focus{
        outline:none;
        border-color:#6d5dfc;
    }

    .counter{
        text-align:right;
        margin-top:15px;
        color:#a0a0a0;
        font-size:1.1rem;
    }

    .buttons{
        display:flex;
        gap:20px;
        margin-top:25px;
        flex-wrap:wrap;
    }

    button{
        flex:1;
        min-width:200px;
        background:black;
        color:white;
        border:2px solid white;
        border-radius:16px;
        padding:18px;
        font-size:1.2rem;
        font-weight:600;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        background:#6d5dfc;
        border-color:#6d5dfc;
    }

    .loading{
        display:none;
        margin-top:25px;
        font-size:1.1rem;
        color:#9b8cff;
        font-weight:600;
    }

    .result{
        display:none;
        margin-top:25px;
        padding:20px;
        border-radius:16px;
        font-size:1.3rem;
        font-weight:bold;
    }

    .spam{
        background:#3b1111;
        color:#ff6b6b;
        border:1px solid #ff4d4d;
    }

    .ham{
        background:#102f1b;
        color:#5df58f;
        border:1px solid #33cc66;
    }

    .tips{
        display:flex;
        gap:15px;
        flex-wrap:wrap;
        margin-top:30px;
    }

    .tip-btn{
        background:#111;
        border:1px solid #666;
        color:white;
        padding:14px 20px;
        border-radius:14px;
        text-decoration:none;
        transition:.3s;
    }

    .tip-btn:hover{
        background:#6d5dfc;
        border-color:#6d5dfc;
    }

    .footer{
        margin-top:40px;
        color:#888;
        font-size:14px;
    }

    @media(max-width:768px){
        h1{
            font-size:2rem;
        }

        textarea{
            height:220px;
        }

        button{
            min-width:100%;
        }
    }
</style>
</head>

<body>

<div class="container">

<h1>📩 Spam Message Checker</h1>

<p class="description">
    Paste your SMS or Email content below to check if it looks like spam before sending.
</p>

<div class="limit-box">
    ⚠ Minimum 10 characters required for analysis
</div>

<div class="card">

    <div class="label">
        PASTE YOUR MESSAGE CONTENT
    </div>

    <textarea
        id="message"
        placeholder="Type or paste your message here..."
        oninput="updateCounter()"></textarea>

    <div class="counter">
        <span id="count">0</span> characters
    </div>

</div>

<div class="buttons">

    <button onclick="classifyMessage()">
        🔍 Analyze for Spam
    </button>

    <button onclick="clearText()">
        🗑 Clear
    </button>

    <button onclick="loadExample()">
        ✨ Try Example
    </button>

</div>

<div id="loading" class="loading">
    Analyzing message...
</div>

<div id="result" class="result"></div>

</div>

<script>

function updateCounter() {
    const text = document.getElementById("message").value;
    document.getElementById("count").innerText = text.length;
}

function clearText() {
    document.getElementById("message").value = "";
    document.getElementById("count").innerText = "0";
    document.getElementById("result").style.display = "none";
}

function loadExample() {
    document.getElementById("message").value =
    "Congratulations! You have won a free iPhone. Click here now to claim your reward.";
    updateCounter();
}

async function classifyMessage() {

    const message = document.getElementById("message").value;

    if(message.trim().length < 10){
        alert("Message must contain at least 10 characters.");
        return;
    }

    const resultDiv = document.getElementById("result");
    const loadingDiv = document.getElementById("loading");

    resultDiv.style.display = "none";
    loadingDiv.style.display = "block";

    try {

        const response = await fetch(
            "http://127.0.0.1:8000/predict",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    message:message
                })
            }
        );

        const data = await response.json();

        loadingDiv.style.display = "none";
        resultDiv.style.display = "block";

        if(data.prediction === "Spam"){

            resultDiv.className = "result spam";

            resultDiv.innerHTML =
            `🚨 SPAM DETECTED<br><br>
            Confidence: ${(data.confidence * 100).toFixed(2)}%`;

        } else {

            resultDiv.className = "result ham";

            resultDiv.innerHTML =
            `✅ NOT SPAM<br><br>
            Confidence: ${(data.confidence * 100).toFixed(2)}%`;
        }

    } catch(error){

        loadingDiv.style.display = "none";

        resultDiv.style.display = "block";
        resultDiv.className = "result spam";

        resultDiv.innerHTML =
        "❌ Unable to connect to FastAPI backend.";

        console.error(error);
    }
}

</script>

</body>
</html>
